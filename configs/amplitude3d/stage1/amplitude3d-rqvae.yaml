dataset:
  type: amplitude3d
  root: /home/gpoloudenny/Projects/crystallography/data/gpu/crystallm/amplitudes/normalized.h5
  data_key: amplitudes
  hkl_max_index: 10
  pad_to_cube: true
  cube_size: 32
  transforms:
    type: none

arch:
  type: rq-vae
  code_hier: 1
  hparams:
    bottleneck_type: rq
    embed_dim: 256
    n_embed: 2048
    # Six encoder stages ensure a 21×21×21 input is reduced to a
    # single latent voxel without hitting a 0-sized feature map.
    latent_shape: [ 1, 1, 256 ]
    code_shape: [ 1, 1, 4 ]
    shared_codebook: true
    decay: 0.99
    restart_unused_codes: true

    loss_type: mse
    latent_loss_weight: 0.25
  ddconfig:
    double_z: false
    z_channels: 256
    resolution: 21
    in_channels: 1
    out_ch: 1
    dim: 3
    ch: 64
    # Six stages (five downsamples) reduce a 21×21×21 input to a single voxel.
    ch_mult: [ 1, 1, 2, 2, 4, 4 ]
    num_res_blocks: 2
    attn_resolutions: [ 16 ]
    dropout: 0.00
  checkpointing: true
 

optimizer:
  # Original VQ-GAN: lr = 4.5e-06 * (batch size) -> 5.4e-5 for batch size 12
  type: adam
  init_lr: 4.0e-5
  weight_decay: 0.0
  betas: [0.5, 0.9]
  warmup:
    epoch: 5  # 5% of total epochs
    multiplier: 1
    buffer_epoch: 0
    min_lr: 4.0e-5
    mode: fix


experiment:
  batch_size: 128
  epochs: 1500
  save_ckpt_freq: 10
  test_freq: 1

gan:
  disc:
    arch:
      in_channels: 1
      dim: 3
      num_layers: 2
      use_actnorm: False
      ndf: 64
      spectral_norm: False

  loss:
    disc_loss: hinge
    gen_loss: vanilla
    disc_weight: 0.75
    perceptual_weight: 1.0
    disc_start: 0